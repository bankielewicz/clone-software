name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify CLI entry point
        run: python3 scripts/clone_pack.py --help
      - name: Run complete offline test suite
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/run_skill_tests.py

  repository-contracts:
    name: Repository contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONPYCACHEPREFIX: ${{ runner.temp }}/clone-software-pycache
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run adversarial capture contracts
        run: python3 -m unittest -v tests.test_capture_adversarial_security tests.test_capture_lifecycle_batch tests.test_capture_parity_contract
      - name: Run documentation contracts
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest -v tests.test_documentation
      - name: Compile Python sources
        run: python3 -m compileall -q scripts tests

  required:
    name: Required
    if: ${{ always() }}
    needs:
      - test
      - repository-contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require successful CI jobs
        env:
          TEST_RESULT: ${{ needs.test.result }}
          CONTRACT_RESULT: ${{ needs.repository-contracts.result }}
        run: |
          test "$TEST_RESULT" = "success"
          test "$CONTRACT_RESULT" = "success"
